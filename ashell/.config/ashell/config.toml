layer = "Top"
enable_esc_key = true

[modules]
left = [ "Workspaces" ]
center = [ "Tempo" ]
right = [ [ "SystemInfo", "localsend", "uptime" ], "Settings"]

[workspaces]
disable_special_workspaces = true
enable_workspace_filling = true
max_workspaces = 10
workspace_names = ["󰈹", "󰠮", "3", "4", "5", "6", "7", "8", "", "󰎇"]

[system_info]
indicators = ["Cpu", "Memory", "Temperature", { Disk = "/", Name = "" }, { Disk = "/media/datadisk", Name = "󰁯" } ]

[system_info.cpu]
warn_threshold = 60
alert_threshold = 85

[system_info.memory]
warn_threshold = 70
alert_threshold = 90

[system_info.disk]
warn_threshold = 75
alert_threshold = 80

[system_info.temperature]
warn_threshold = 75
alert_threshold = 90

[tempo]
clock_format = "%d.%m. %H:%M"
formats = [
	"%d.%m. %H:%M",
	"%a %d.%m. %B %H:%M"
]

[settings]
lock_cmd = "hyprlock &"
shutdown_cmd = "shutdown now"
suspend_cmd = "systemctl suspend"
hibernate_cmd = "systemctl hibernate"
reboot_cmd = "systemctl reboot"
logout_cmd = "loginctl kill-user $(whoami)"
wifi_more_cmd = "kitty --app-id=popup impala"
bluetooth_more_cmd = "kitty --app-id=popup bluetui"
indicators = [ "Battery", "Audio", "Microphone", "Network", "Bluetooth" ]
battery_format = "IconAndPercentage"

[[CustomModule]]
name = "uptime"
listen_cmd = "~/.config/ashell/scripts/uptime.sh"

[[CustomModule]]
name = "localsend"
type = "Button"
icon = ""
command = "localsend"

[appearance]
font_name = "JetBrainsMono Nerd Font"
